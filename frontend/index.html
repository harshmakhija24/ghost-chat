<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GhostChat - Secure Anonymous Messaging</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <!-- Background elements -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div id="app">
      <!-- Landing/Join View -->
      <div id="join-view" class="view glass-panel active">
        <div class="logo">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a9 9 0 0 0-9 9v7.5A2.5 2.5 0 0 0 5.5 21h13a2.5 2.5 0 0 0 2.5-2.5V11a9 9 0 0 0-9-9z"></path><path d="M9 13h.01"></path><path d="M15 13h.01"></path></svg>
          <h1>GhostChat</h1>
        </div>
        <p class="subtitle">End-to-End Encrypted Anonymous Chat</p>
        
        <div class="input-group">
          <label for="room-input">Channel ID</label>
          <input type="text" id="room-input" placeholder="Enter channel name..." autocomplete="off">
        </div>
        
        <button id="join-btn" class="primary-btn">Join Secure Channel</button>
      </div>

      <!-- Chat Room View -->
      <div id="chat-view" class="view glass-panel hidden">
        <header class="chat-header">
          <div class="room-info">
            <span class="status-indicator" id="conn-status"></span>
            <h2>Channel: <span id="current-room"></span></h2>
            <button id="copy-room-btn" class="icon-btn-small" title="Copy Channel ID">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
          </div>
          <div class="security-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <span title="Messages are encrypted locally before leaving your device">E2E Encrypted</span>
          </div>
          <button id="leave-btn" class="icon-btn" title="Leave Channel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </header>
        
        <div class="messages-container" id="messages-list">
          <!-- Messages will be injected here -->
          <div class="system-message">Secure environment initialized. Waiting for connection...</div>
        </div>
        
        <form id="message-form" class="message-input-area">
          <input type="text" id="message-input" placeholder="Type an encrypted message..." autocomplete="off" required>
          <button type="submit" class="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </form>
      </div>
    </div>

    <!-- Script tags: load external libraries directly to allow static hosting --><!-- Socket.IO loaded from CDN -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
